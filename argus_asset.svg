<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="bgGrad3" cx="50%" cy="38%" r="85%">
      <stop offset="0%" stop-color="#0c1620"/>
      <stop offset="55%" stop-color="#05080c"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="bodyGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a4a60"/>
      <stop offset="100%" stop-color="#161e2c"/>
    </linearGradient>
    <radialGradient id="lensGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.95"/>
      <stop offset="55%" stop-color="#00e5ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cyanGlow3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="centerGlow3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#00e5ff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="blurSoft3" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <filter id="blurWide3" x="-100%" y="-100%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
    <filter id="blurTight3" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <pattern id="grid3" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#00e5ff" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
    <pattern id="circuit3" width="160" height="160" patternUnits="userSpaceOnUse">
      <path d="M0 40 H60 V90 H160" stroke="#00e5ff" stroke-width="1" fill="none" opacity="0.10"/>
      <path d="M90 0 V50 H140 V160" stroke="#00e5ff" stroke-width="1" fill="none" opacity="0.10"/>
      <path d="M0 120 H40 V160" stroke="#00e5ff" stroke-width="1" fill="none" opacity="0.08"/>
      <circle cx="60" cy="40" r="3" fill="#00e5ff" opacity="0.22"/>
      <circle cx="90" cy="50" r="3" fill="#00e5ff" opacity="0.22"/>
      <circle cx="140" cy="90" r="3" fill="#00e5ff" opacity="0.22"/>
      <rect x="100" y="100" width="22" height="22" fill="none" stroke="#00e5ff" stroke-width="1" opacity="0.12"/>
    </pattern>
  </defs>

  <rect width="1024" height="1024" fill="url(#bgGrad3)"/>
  <rect width="1024" height="1024" fill="url(#circuit3)"/>
  <rect width="1024" height="1024" fill="url(#grid3)"/>

  <!-- Ambient glows -->
  <ellipse cx="380" cy="420" rx="420" ry="340" fill="url(#centerGlow3)" filter="url(#blurWide3)"/>
  <ellipse cx="800" cy="820" rx="260" ry="200" fill="url(#cyanGlow3)" opacity="0.3" filter="url(#blurSoft3)"/>

  <!-- Mount arm -->
  <rect x="140" y="180" width="26" height="150" fill="url(#bodyGrad3)" stroke="#00e5ff" stroke-width="1.5" opacity="0.8"/>

  <!-- Camera body (box style), enlarged -->
  <g>
    <rect x="166" y="290" width="290" height="148" rx="18" fill="url(#bodyGrad3)" stroke="#00e5ff" stroke-width="3"/>
    <rect x="182" y="308" width="80" height="22" rx="5" fill="#05121a" stroke="#00e5ff" stroke-width="1" opacity="0.7"/>
    <rect x="182" y="340" width="120" height="10" rx="3" fill="#00e5ff" opacity="0.35"/>
    <rect x="182" y="358" width="90" height="10" rx="3" fill="#00e5ff" opacity="0.25"/>
    <!-- lens housing -->
    <circle cx="500" cy="364" r="80" fill="url(#lensGlow)" filter="url(#blurSoft3)"/>
    <circle cx="500" cy="364" r="64" fill="#05121a" stroke="#00e5ff" stroke-width="3.5"/>
    <circle cx="500" cy="364" r="42" fill="#0a1620" stroke="#00e5ff" stroke-width="2" opacity="0.8"/>
    <circle cx="500" cy="364" r="20" fill="#00e5ff" opacity="0.85" filter="url(#blurTight3)"/>
    <circle cx="510" cy="352" r="7" fill="#bff7ff"/>
  </g>

  <!-- Radiating beams from lens -->
  <g stroke="#00e5ff" stroke-width="2" opacity="0.3" filter="url(#blurSoft3)">
    <line x1="500" y1="364" x2="40" y2="40"/>
    <line x1="500" y1="364" x2="40" y2="640"/>
    <line x1="500" y1="364" x2="500" y2="20"/>
  </g>

  <!-- RTSP signal waves from lens to scene -->
  <g stroke="#00e5ff" fill="none" opacity="0.5">
    <path d="M 580 320 Q 700 250 840 300" stroke-width="2.5"/>
    <path d="M 580 364 Q 740 320 920 400" stroke-width="2.5"/>
    <path d="M 580 410 Q 700 470 840 450" stroke-width="2.5"/>
  </g>

  <!-- Scene: detected person silhouette with bounding box -->
  <g>
    <ellipse cx="760" cy="950" rx="100" ry="24" fill="url(#cyanGlow3)" opacity="0.5" filter="url(#blurSoft3)"/>
    <!-- silhouette -->
    <g fill="#222e40" opacity="0.9">
      <circle cx="760" cy="590" r="38"/>
      <path d="M 705 640 Q 760 618 815 640 L 836 850 L 782 850 L 760 740 L 738 850 L 684 850 Z"/>
    </g>
    <!-- bounding box -->
    <rect x="666" y="548" width="190" height="340" fill="none" stroke="#00e5ff" stroke-width="3" opacity="0.85"/>
    <line x1="666" y1="548" x2="710" y2="548" stroke="#00e5ff" stroke-width="6"/>
    <line x1="666" y1="548" x2="666" y2="592" stroke="#00e5ff" stroke-width="6"/>
    <line x1="856" y1="548" x2="812" y2="548" stroke="#00e5ff" stroke-width="6"/>
    <line x1="856" y1="548" x2="856" y2="592" stroke="#00e5ff" stroke-width="6"/>
    <text x="666" y="534" font-family="'Courier New', monospace" font-size="14" fill="#00e5ff" opacity="0.85">PERSON 0.97</text>
  </g>

  <!-- Secondary detection: bag / object -->
  <g>
    <g fill="#222e40" opacity="0.8">
      <rect x="560" y="800" width="58" height="46" rx="6"/>
    </g>
    <rect x="552" y="794" width="74" height="60" fill="none" stroke="#00e5ff" stroke-width="2" opacity="0.6" stroke-dasharray="4 6"/>
    <text x="552" y="788" font-family="'Courier New', monospace" font-size="12" fill="#00e5ff" opacity="0.7">BAG 0.84</text>
  </g>

  <!-- VLM caption / classification card -->
  <g>
    <rect x="540" y="120" width="430" height="130" rx="12" fill="#0a0712" stroke="#00e5ff" stroke-width="2.5" opacity="0.92"/>
    <text x="566" y="160" font-family="'Inter', sans-serif" font-size="24" fill="#ffffff" font-weight="600">Person detected: entry zone</text>
    <text x="566" y="190" font-family="'Inter', sans-serif" font-size="16" fill="#94a3b8">Carrying a bag, approaching from the east corridor</text>
    <text x="566" y="222" font-family="'Courier New', monospace" font-size="15" fill="#00e5ff" opacity="0.85">VLM CONFIDENCE · 97.2%</text>
    <rect x="566" y="232" width="380" height="6" fill="#0e2a33"/>
    <rect x="566" y="232" width="368" height="6" fill="#00e5ff" opacity="0.8"/>
  </g>

  <!-- MQTT publish path to vector store -->
  <g stroke="#00e5ff" stroke-width="2" stroke-dasharray="6 8" opacity="0.5" fill="none">
    <path d="M 760 250 C 850 400, 920 600, 900 740"/>
  </g>

  <!-- Embedding space visualization -->
  <g>
    <rect x="64" y="700" width="320" height="240" rx="12" fill="#060a10" stroke="#00e5ff" stroke-width="2" opacity="0.85"/>
    <text x="84" y="734" font-family="'Courier New', monospace" font-size="18" fill="#00e5ff" letter-spacing="2">SigCLIP EMBEDDINGS</text>
    <g stroke="#00e5ff" stroke-opacity="0.15" stroke-width="1">
      <line x1="84" y1="760" x2="84" y2="920"/>
      <line x1="84" y1="920" x2="364" y2="920"/>
    </g>
    <g fill="#00e5ff">
      <circle cx="120" cy="900" r="5" opacity="0.5"/>
      <circle cx="150" cy="860" r="5" opacity="0.5"/>
      <circle cx="170" cy="890" r="5" opacity="0.5"/>
      <circle cx="200" cy="840" r="7" opacity="0.9"/>
      <circle cx="225" cy="870" r="5" opacity="0.5"/>
      <circle cx="250" cy="820" r="5" opacity="0.5"/>
      <circle cx="280" cy="850" r="5" opacity="0.5"/>
      <circle cx="300" cy="800" r="5" opacity="0.5"/>
      <circle cx="330" cy="870" r="5" opacity="0.5"/>
      <circle cx="190" cy="780" r="5" opacity="0.4"/>
      <circle cx="260" cy="900" r="5" opacity="0.4"/>
    </g>
    <circle cx="200" cy="840" r="16" fill="none" stroke="#bff7ff" stroke-width="1.5" opacity="0.8"/>
    <text x="84" y="958" font-family="'Courier New', monospace" font-size="14" fill="#00e5ff" opacity="0.7">NEW EVENT → NEAREST: 0.91</text>
  </g>

  <!-- Qdrant / MQTT node -->
  <g>
    <circle cx="900" cy="800" r="70" fill="url(#cyanGlow3)" filter="url(#blurSoft3)"/>
    <rect x="840" y="752" width="120" height="96" rx="12" fill="url(#bodyGrad3)" stroke="#00e5ff" stroke-width="3"/>
    <rect x="858" y="772" width="84" height="12" rx="3" fill="#00e5ff" opacity="0.7"/>
    <rect x="858" y="794" width="84" height="12" rx="3" fill="#00e5ff" opacity="0.5"/>
    <rect x="858" y="816" width="56" height="12" rx="3" fill="#00e5ff" opacity="0.35"/>
    <text x="900" y="868" font-family="'Courier New', monospace" font-size="14" fill="#00e5ff" text-anchor="middle" opacity="0.8">QDRANT</text>
  </g>

  <!-- HUD corner brackets -->
  <g stroke="#00e5ff" stroke-width="3" fill="none" opacity="0.55">
    <path d="M 40 40 L 40 110 M 40 40 L 110 40"/>
    <path d="M 984 40 L 984 110 M 984 40 L 914 40"/>
    <path d="M 40 984 L 40 914 M 40 984 L 110 984"/>
    <path d="M 984 984 L 984 914 M 984 984 L 914 984"/>
  </g>

  <!-- HUD telemetry text -->
  <g font-family="'Courier New', monospace" fill="#00e5ff" opacity="0.8">
    <text x="60" y="70" font-size="24" letter-spacing="2">ARGUS AI</text>
    <text x="60" y="100" font-size="16" opacity="0.6">JETSON ORIN NANO · RTSP</text>
    <text x="964" y="270" font-size="20" letter-spacing="2" text-anchor="end">MQTT → QDRANT</text>
    <text x="964" y="296" font-size="15" opacity="0.6" text-anchor="end">SigCLIP + Gemma / Ollama</text>
  </g>
</svg>
