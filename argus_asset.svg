<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="bgGrad3" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#0a1018"/>
      <stop offset="60%" stop-color="#05080c"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="bodyGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a4a60"/>
      <stop offset="100%" stop-color="#161e2c"/>
    </linearGradient>
    <radialGradient id="lensGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.95"/>
      <stop offset="55%" stop-color="#00e5ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cyanGlow3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="blurSoft3" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <filter id="blurTight3" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <pattern id="grid3" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#00e5ff" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1024" height="1024" fill="url(#bgGrad3)"/>
  <rect width="1024" height="1024" fill="url(#grid3)"/>

  <!-- Ambient glows -->
  <ellipse cx="300" cy="320" rx="260" ry="200" fill="url(#lensGlow)" opacity="0.15" filter="url(#blurSoft3)"/>
  <ellipse cx="780" cy="780" rx="220" ry="160" fill="url(#cyanGlow3)" opacity="0.35" filter="url(#blurSoft3)"/>

  <!-- Mount arm -->
  <rect x="120" y="180" width="20" height="120" fill="url(#bodyGrad3)" stroke="#00e5ff" stroke-width="1.5" opacity="0.8"/>

  <!-- Camera body (box style) -->
  <g>
    <rect x="140" y="260" width="220" height="110" rx="14" fill="url(#bodyGrad3)" stroke="#00e5ff" stroke-width="2.5"/>
    <rect x="150" y="272" width="60" height="16" rx="4" fill="#05121a" stroke="#00e5ff" stroke-width="1" opacity="0.7"/>
    <!-- lens housing -->
    <circle cx="380" cy="315" r="58" fill="url(#lensGlow)" filter="url(#blurSoft3)"/>
    <circle cx="380" cy="315" r="46" fill="#05121a" stroke="#00e5ff" stroke-width="3"/>
    <circle cx="380" cy="315" r="30" fill="#0a1620" stroke="#00e5ff" stroke-width="1.5" opacity="0.8"/>
    <circle cx="380" cy="315" r="14" fill="#00e5ff" opacity="0.85" filter="url(#blurTight3)"/>
    <circle cx="386" cy="308" r="5" fill="#bff7ff"/>
  </g>

  <!-- RTSP signal waves from lens -->
  <g stroke="#00e5ff" fill="none" opacity="0.5">
    <path d="M 440 290 Q 520 250 600 290" stroke-width="2"/>
    <path d="M 440 315 Q 540 275 660 320" stroke-width="2"/>
    <path d="M 440 340 Q 520 380 600 360" stroke-width="2"/>
  </g>

  <!-- Scene: detected person silhouette with bounding box -->
  <g>
    <ellipse cx="700" cy="900" rx="90" ry="22" fill="url(#cyanGlow3)" opacity="0.5" filter="url(#blurSoft3)"/>
    <!-- silhouette -->
    <g fill="#222e40" opacity="0.9">
      <circle cx="700" cy="560" r="34"/>
      <path d="M 650 605 Q 700 585 750 605 L 768 800 L 720 800 L 700 700 L 680 800 L 632 800 Z"/>
    </g>
    <!-- bounding box -->
    <rect x="612" y="520" width="176" height="320" fill="none" stroke="#00e5ff" stroke-width="2.5" opacity="0.85"/>
    <line x1="612" y1="520" x2="652" y2="520" stroke="#00e5ff" stroke-width="5"/>
    <line x1="612" y1="520" x2="612" y2="560" stroke="#00e5ff" stroke-width="5"/>
    <line x1="788" y1="520" x2="748" y2="520" stroke="#00e5ff" stroke-width="5"/>
    <line x1="788" y1="520" x2="788" y2="560" stroke="#00e5ff" stroke-width="5"/>
  </g>

  <!-- VLM caption / classification card -->
  <g>
    <rect x="560" y="430" width="280" height="78" rx="10" fill="#0a0712" stroke="#00e5ff" stroke-width="2" opacity="0.92"/>
    <text x="580" y="462" font-family="'Inter', sans-serif" font-size="20" fill="#ffffff" font-weight="600">Person detected: entry zone</text>
    <text x="580" y="488" font-family="'Courier New', monospace" font-size="15" fill="#00e5ff" opacity="0.85">VLM CONFIDENCE · 97.2%</text>
  </g>

  <!-- MQTT publish path to vector store -->
  <g stroke="#00e5ff" stroke-width="2" stroke-dasharray="6 8" opacity="0.5" fill="none">
    <path d="M 550 480 C 700 560, 800 650, 840 740"/>
  </g>
  <g>
    <circle cx="840" cy="760" r="50" fill="url(#cyanGlow3)" filter="url(#blurSoft3)"/>
    <rect x="800" y="730" width="80" height="60" rx="8" fill="url(#bodyGrad3)" stroke="#00e5ff" stroke-width="2.5"/>
    <rect x="812" y="742" width="56" height="10" rx="2" fill="#00e5ff" opacity="0.7"/>
    <rect x="812" y="758" width="56" height="10" rx="2" fill="#00e5ff" opacity="0.5"/>
    <rect x="812" y="774" width="36" height="10" rx="2" fill="#00e5ff" opacity="0.35"/>
  </g>

  <!-- HUD corner brackets -->
  <g stroke="#00e5ff" stroke-width="3" fill="none" opacity="0.55">
    <path d="M 80 80 L 80 150 M 80 80 L 150 80"/>
    <path d="M 944 80 L 944 150 M 944 80 L 874 80"/>
    <path d="M 80 944 L 80 874 M 80 944 L 150 944"/>
    <path d="M 944 944 L 944 874 M 944 944 L 874 944"/>
  </g>

  <!-- HUD telemetry text -->
  <g font-family="'Courier New', monospace" fill="#00e5ff" opacity="0.8">
    <text x="100" y="120" font-size="22" letter-spacing="2">ARGUS AI</text>
    <text x="100" y="150" font-size="16" opacity="0.6">JETSON ORIN NANO · RTSP</text>
    <text x="924" y="120" font-size="22" letter-spacing="2" text-anchor="end">MQTT → QDRANT</text>
    <text x="924" y="150" font-size="16" opacity="0.6" text-anchor="end">SigCLIP + Gemma/Ollama</text>
  </g>
</svg>
