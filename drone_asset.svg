<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="38%" r="85%">
      <stop offset="0%" stop-color="#0c1620"/>
      <stop offset="55%" stop-color="#05080c"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="armGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a4a60"/>
      <stop offset="100%" stop-color="#161e2c"/>
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2c3a4e"/>
      <stop offset="100%" stop-color="#141c28"/>
    </linearGradient>
    <radialGradient id="motorGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#00e5ff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="targetGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#00e5ff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="blurSoft" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <filter id="blurWide" x="-100%" y="-100%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
    <filter id="blurTight" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#00e5ff" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
    <pattern id="circuit" width="160" height="160" patternUnits="userSpaceOnUse">
      <path d="M0 40 H60 V90 H160" stroke="#00e5ff" stroke-width="1" fill="none" opacity="0.10"/>
      <path d="M90 0 V50 H140 V160" stroke="#00e5ff" stroke-width="1" fill="none" opacity="0.10"/>
      <path d="M0 120 H40 V160" stroke="#00e5ff" stroke-width="1" fill="none" opacity="0.08"/>
      <path d="M120 0 V30" stroke="#00e5ff" stroke-width="1" fill="none" opacity="0.08"/>
      <circle cx="60" cy="40" r="3" fill="#00e5ff" opacity="0.22"/>
      <circle cx="90" cy="50" r="3" fill="#00e5ff" opacity="0.22"/>
      <circle cx="140" cy="90" r="3" fill="#00e5ff" opacity="0.22"/>
      <circle cx="40" cy="120" r="3" fill="#00e5ff" opacity="0.18"/>
      <rect x="100" y="100" width="22" height="22" fill="none" stroke="#00e5ff" stroke-width="1" opacity="0.12"/>
    </pattern>
  </defs>

  <rect width="1024" height="1024" fill="url(#bgGrad)"/>
  <rect width="1024" height="1024" fill="url(#circuit)"/>
  <rect width="1024" height="1024" fill="url(#grid)"/>

  <!-- Ambient glow behind drone -->
  <ellipse cx="512" cy="380" rx="520" ry="380" fill="url(#centerGlow)" filter="url(#blurWide)"/>

  <!-- Radiating light beams from drone core to frame edges -->
  <g stroke="#00e5ff" stroke-width="2" opacity="0.35" filter="url(#blurSoft)">
    <line x1="512" y1="380" x2="60" y2="60"/>
    <line x1="512" y1="380" x2="964" y2="60"/>
    <line x1="512" y1="380" x2="60" y2="640"/>
    <line x1="512" y1="380" x2="964" y2="640"/>
    <line x1="512" y1="380" x2="512" y2="20"/>
    <line x1="512" y1="380" x2="40" y2="380"/>
    <line x1="512" y1="380" x2="984" y2="380"/>
  </g>
  <g stroke="#00e5ff" stroke-width="0.75" opacity="0.5">
    <line x1="512" y1="380" x2="60" y2="60"/>
    <line x1="512" y1="380" x2="964" y2="60"/>
    <line x1="512" y1="380" x2="60" y2="640"/>
    <line x1="512" y1="380" x2="964" y2="640"/>
  </g>

  <!-- Pick-and-place target zone -->
  <ellipse cx="512" cy="900" rx="280" ry="70" fill="url(#targetGlow)" filter="url(#blurSoft)"/>
  <g stroke="#00e5ff" stroke-width="0.75" opacity="0.25">
    <ellipse cx="512" cy="900" rx="280" ry="70" fill="none"/>
    <ellipse cx="512" cy="900" rx="190" ry="48" fill="none"/>
  </g>
  <g stroke="#00e5ff" stroke-width="3" fill="none" opacity="0.8">
    <rect x="442" y="850" width="140" height="100" rx="6"/>
    <line x1="442" y1="832" x2="442" y2="850"/>
    <line x1="582" y1="832" x2="582" y2="850"/>
    <line x1="442" y1="950" x2="442" y2="968"/>
    <line x1="582" y1="950" x2="582" y2="968"/>
  </g>
  <line x1="512" y1="630" x2="512" y2="850" stroke="#00e5ff" stroke-width="2" stroke-dasharray="6 10" opacity="0.55"/>

  <!-- Drone arms (X configuration), enlarged span -->
  <g stroke="#00e5ff" stroke-width="30" stroke-linecap="round" opacity="0.3">
    <line x1="512" y1="380" x2="200" y2="160"/>
    <line x1="512" y1="380" x2="824" y2="160"/>
    <line x1="512" y1="380" x2="200" y2="600"/>
    <line x1="512" y1="380" x2="824" y2="600"/>
  </g>
  <g stroke="url(#armGrad)" stroke-width="26" stroke-linecap="round">
    <line x1="512" y1="380" x2="200" y2="160"/>
    <line x1="512" y1="380" x2="824" y2="160"/>
    <line x1="512" y1="380" x2="200" y2="600"/>
    <line x1="512" y1="380" x2="824" y2="600"/>
  </g>

  <!-- Propeller motion blur -->
  <g fill="#00e5ff" opacity="0.06">
    <ellipse cx="200" cy="160" rx="100" ry="22"/>
    <ellipse cx="824" cy="160" rx="100" ry="22"/>
    <ellipse cx="200" cy="600" rx="100" ry="22"/>
    <ellipse cx="824" cy="600" rx="100" ry="22"/>
  </g>

  <!-- Motor glows -->
  <g>
    <circle cx="200" cy="160" r="78" fill="url(#motorGlow)"/>
    <circle cx="824" cy="160" r="78" fill="url(#motorGlow)"/>
    <circle cx="200" cy="600" r="78" fill="url(#motorGlow)"/>
    <circle cx="824" cy="600" r="78" fill="url(#motorGlow)"/>
  </g>

  <!-- Propeller rings -->
  <g fill="none" stroke="#00e5ff" stroke-width="3.5" opacity="0.85">
    <circle cx="200" cy="160" r="60"/>
    <circle cx="824" cy="160" r="60"/>
    <circle cx="200" cy="600" r="60"/>
    <circle cx="824" cy="600" r="60"/>
  </g>
  <g fill="none" stroke="#00e5ff" stroke-width="1.5" opacity="0.4">
    <circle cx="200" cy="160" r="76"/>
    <circle cx="824" cy="160" r="76"/>
    <circle cx="200" cy="600" r="76"/>
    <circle cx="824" cy="600" r="76"/>
  </g>

  <!-- Motor hubs -->
  <g fill="#0c121c" stroke="#00e5ff" stroke-width="2.5">
    <circle cx="200" cy="160" r="18"/>
    <circle cx="824" cy="160" r="18"/>
    <circle cx="200" cy="600" r="18"/>
    <circle cx="824" cy="600" r="18"/>
  </g>
  <g fill="#bff7ff">
    <circle cx="200" cy="160" r="6"/>
    <circle cx="824" cy="160" r="6"/>
    <circle cx="200" cy="600" r="6"/>
    <circle cx="824" cy="600" r="6"/>
  </g>

  <!-- Central body -->
  <g>
    <circle cx="512" cy="380" r="150" fill="url(#motorGlow)" opacity="0.5" filter="url(#blurSoft)"/>
    <rect x="402" y="300" width="220" height="180" rx="24" fill="url(#bodyGrad)" stroke="#00e5ff" stroke-width="3"/>
    <rect x="440" y="334" width="144" height="112" rx="14" fill="#05121a" stroke="#00e5ff" stroke-width="1.5" opacity="0.9"/>
    <!-- internal PCB detail -->
    <g stroke="#00e5ff" stroke-width="1" opacity="0.3" fill="none">
      <path d="M452 346 H520 V370 H560"/>
      <path d="M452 420 H500"/>
      <circle cx="520" cy="370" r="2.5" fill="#00e5ff" opacity="0.6"/>
    </g>
    <circle cx="512" cy="390" r="30" fill="#00e5ff" opacity="0.85" filter="url(#blurTight)"/>
    <circle cx="512" cy="390" r="13" fill="#bff7ff"/>
    <!-- antenna -->
    <line x1="512" y1="300" x2="512" y2="262" stroke="#3a4a60" stroke-width="6" stroke-linecap="round"/>
    <circle cx="512" cy="258" r="7" fill="#00e5ff" opacity="0.9" filter="url(#blurTight)"/>
  </g>

  <!-- Landing legs -->
  <g stroke="#3a4a60" stroke-width="14" stroke-linecap="round">
    <line x1="430" y1="470" x2="390" y2="560"/>
    <line x1="594" y1="470" x2="634" y2="560"/>
  </g>
  <g stroke="#00e5ff" stroke-width="3" stroke-linecap="round" opacity="0.6">
    <line x1="358" y1="556" x2="422" y2="556"/>
    <line x1="602" y1="556" x2="666" y2="556"/>
  </g>

  <!-- HUD telemetry data panels (bottom corners) -->
  <g font-family="'Courier New', monospace">
    <rect x="64" y="700" width="230" height="120" rx="8" fill="#060a10" stroke="#00e5ff" stroke-width="1.5" opacity="0.85"/>
    <text x="84" y="732" font-size="16" fill="#00e5ff" letter-spacing="2">ALT  124.6 m</text>
    <text x="84" y="760" font-size="16" fill="#00e5ff" letter-spacing="2" opacity="0.85">SPD  4.2 m/s</text>
    <text x="84" y="788" font-size="16" fill="#00e5ff" letter-spacing="2" opacity="0.7">YAW  087°</text>
    <rect x="84" y="800" width="190" height="6" fill="#0e2a33"/>
    <rect x="84" y="800" width="130" height="6" fill="#00e5ff" opacity="0.7"/>

    <rect x="730" y="700" width="230" height="120" rx="8" fill="#060a10" stroke="#00e5ff" stroke-width="1.5" opacity="0.85"/>
    <text x="750" y="732" font-size="16" fill="#00e5ff" letter-spacing="2">SLAM  ACTIVE</text>
    <text x="750" y="760" font-size="16" fill="#00e5ff" letter-spacing="2" opacity="0.85">FEAT  1284 pts</text>
    <text x="750" y="788" font-size="16" fill="#00e5ff" letter-spacing="2" opacity="0.7">BATT  84%</text>
    <rect x="750" y="800" width="190" height="6" fill="#0e2a33"/>
    <rect x="750" y="800" width="160" height="6" fill="#00e5ff" opacity="0.7"/>
  </g>

  <!-- HUD corner brackets -->
  <g stroke="#00e5ff" stroke-width="3" fill="none" opacity="0.55">
    <path d="M 40 40 L 40 110 M 40 40 L 110 40"/>
    <path d="M 984 40 L 984 110 M 984 40 L 914 40"/>
    <path d="M 40 984 L 40 914 M 40 984 L 110 984"/>
    <path d="M 984 984 L 984 914 M 984 984 L 914 984"/>
  </g>

  <!-- HUD telemetry text -->
  <g font-family="'Courier New', monospace" fill="#00e5ff" opacity="0.8">
    <text x="60" y="70" font-size="24" letter-spacing="2">PX4 // SITL</text>
    <text x="60" y="100" font-size="16" opacity="0.6">GPS LOCK · 14 SAT</text>
    <text x="964" y="70" font-size="24" letter-spacing="2" text-anchor="end">JETSON ORIN NANO</text>
    <text x="964" y="100" font-size="16" opacity="0.6" text-anchor="end">ROS2 JAZZY · MAVLINK</text>
    <text x="964" y="130" font-size="22" letter-spacing="2" text-anchor="end">●REC</text>
  </g>
  <g font-family="'Courier New', monospace" fill="#00e5ff" opacity="0.6">
    <text x="512" y="990" font-size="18" letter-spacing="3" text-anchor="middle">PICK &amp; PLACE TARGET</text>
  </g>
</svg>
