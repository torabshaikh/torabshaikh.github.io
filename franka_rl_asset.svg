<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="bgGrad2" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#0c0a18"/>
      <stop offset="60%" stop-color="#05080c"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="armGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a4a60"/>
      <stop offset="100%" stop-color="#161e2c"/>
    </linearGradient>
    <radialGradient id="jointGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#00e5ff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cyanGlow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.8"/>
      <stop offset="60%" stop-color="#00e5ff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cubeFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#142436"/>
      <stop offset="100%" stop-color="#0a1018"/>
    </linearGradient>
    <linearGradient id="cubeTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#0e5b6e"/>
    </linearGradient>
    <filter id="blurSoft2" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <filter id="blurTight2" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <pattern id="grid2" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#00e5ff" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1024" height="1024" fill="url(#bgGrad2)"/>
  <rect width="1024" height="1024" fill="url(#grid2)"/>

  <!-- Floor plane -->
  <line x1="60" y1="860" x2="964" y2="860" stroke="#00e5ff" stroke-opacity="0.25" stroke-width="2"/>
  <ellipse cx="700" cy="860" rx="240" ry="30" fill="url(#cyanGlow2)" opacity="0.4" filter="url(#blurSoft2)"/>
  <ellipse cx="280" cy="870" rx="200" ry="36" fill="url(#jointGlow)" opacity="0.3" filter="url(#blurSoft2)"/>

  <!-- Base -->
  <rect x="200" y="850" width="160" height="46" rx="8" fill="url(#armGrad2)" stroke="#00e5ff" stroke-width="2"/>
  <rect x="240" y="810" width="80" height="44" rx="8" fill="url(#armGrad2)" stroke="#00e5ff" stroke-width="2"/>

  <!-- 7-DOF arm chain (base -> shoulder -> elbow -> wrist -> gripper) -->
  <g stroke-linecap="round">
    <line x1="280" y1="810" x2="280" y2="690" stroke="url(#armGrad2)" stroke-width="34"/>
    <line x1="280" y1="690" x2="470" y2="600" stroke="url(#armGrad2)" stroke-width="30"/>
    <line x1="470" y1="600" x2="470" y2="470" stroke="url(#armGrad2)" stroke-width="26"/>
    <line x1="470" y1="470" x2="640" y2="430" stroke="url(#armGrad2)" stroke-width="22"/>
    <line x1="640" y1="430" x2="700" y2="540" stroke="url(#armGrad2)" stroke-width="18"/>
    <line x1="700" y1="540" x2="722" y2="600" stroke="url(#armGrad2)" stroke-width="14"/>
  </g>

  <!-- Joint glows + hubs -->
  <g>
    <circle cx="280" cy="810" r="34" fill="url(#jointGlow)"/>
    <circle cx="280" cy="690" r="30" fill="url(#jointGlow)"/>
    <circle cx="470" cy="600" r="28" fill="url(#jointGlow)"/>
    <circle cx="470" cy="470" r="26" fill="url(#jointGlow)"/>
    <circle cx="640" cy="430" r="22" fill="url(#jointGlow)"/>
    <circle cx="700" cy="540" r="18" fill="url(#jointGlow)"/>
  </g>
  <g fill="#0c121c" stroke="#00e5ff" stroke-width="2">
    <circle cx="280" cy="810" r="17"/>
    <circle cx="280" cy="690" r="15"/>
    <circle cx="470" cy="600" r="14"/>
    <circle cx="470" cy="470" r="13"/>
    <circle cx="640" cy="430" r="11"/>
    <circle cx="700" cy="540" r="9"/>
  </g>

  <!-- Gripper -->
  <g stroke="#bff7ff" stroke-width="6" stroke-linecap="round" fill="none">
    <path d="M 722 600 L 700 640 L 712 660"/>
    <path d="M 722 600 L 748 636 L 738 658"/>
  </g>
  <circle cx="722" cy="600" r="10" fill="#00e5ff" filter="url(#blurTight2)"/>

  <!-- Stacked cubes (pick and stack) -->
  <g>
    <!-- bottom cube -->
    <g>
      <rect x="650" y="752" width="120" height="90" fill="url(#cubeFace)" stroke="#00e5ff" stroke-width="2"/>
      <polygon points="650,752 690,722 810,722 770,752" fill="url(#cubeTop)" opacity="0.9"/>
      <polygon points="770,752 810,722 810,812 770,842" fill="#0a1822" opacity="0.9"/>
    </g>
    <!-- middle cube -->
    <g>
      <rect x="664" y="672" width="92" height="80" fill="url(#cubeFace)" stroke="#00e5ff" stroke-width="2"/>
      <polygon points="664,672 696,648 788,648 756,672" fill="url(#cubeTop)" opacity="0.9"/>
      <polygon points="756,672 788,648 788,728 756,752" fill="#0a1822" opacity="0.9"/>
    </g>
    <!-- top cube being placed -->
    <g opacity="0.95">
      <rect x="676" y="606" width="70" height="62" fill="url(#cubeFace)" stroke="#00e5ff" stroke-width="2.5"/>
      <polygon points="676,606 702,586 772,586 746,606" fill="url(#cubeTop)"/>
      <polygon points="746,606 772,586 772,648 746,668" fill="#0a1822"/>
    </g>
  </g>

  <!-- HUD corner brackets -->
  <g stroke="#00e5ff" stroke-width="3" fill="none" opacity="0.55">
    <path d="M 80 80 L 80 150 M 80 80 L 150 80"/>
    <path d="M 944 80 L 944 150 M 944 80 L 874 80"/>
    <path d="M 80 944 L 80 874 M 80 944 L 150 944"/>
    <path d="M 944 944 L 944 874 M 944 944 L 874 944"/>
  </g>

  <!-- HUD telemetry text -->
  <g font-family="'Courier New', monospace" fill="#00e5ff" opacity="0.8">
    <text x="100" y="120" font-size="22" letter-spacing="2">FRANKA PANDA · 7-DOF</text>
    <text x="100" y="150" font-size="16" opacity="0.6">FetchPickAndPlace-v3</text>
    <text x="924" y="120" font-size="22" letter-spacing="2" text-anchor="end">TD3+BC / SAC+HER</text>
    <text x="924" y="150" font-size="16" opacity="0.6" text-anchor="end">50M+ TIMESTEPS</text>
  </g>
  <g font-family="'Courier New', monospace" fill="#00e5ff" opacity="0.85">
    <rect x="780" y="200" width="160" height="56" rx="6" fill="#060a10" stroke="#00e5ff" stroke-width="1.5" opacity="0.85"/>
    <text x="800" y="224" font-size="16">REWARD: +1.00</text>
    <text x="800" y="246" font-size="14" opacity="0.7">STACK: 3/3</text>
  </g>
</svg>
